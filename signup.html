<!DOCTYPE html>
<html>
<head>
  <title>WhatsApp Embedded Signup</title>
  <style>
    body { font-family: Arial; padding: 50px; text-align: center; }
    button { padding: 15px 30px; font-size: 18px; background: #1877f2; color: white; border: none; border-radius: 8px; cursor: pointer; }
    button:hover { background: #145dbf; }
    #result { margin-top: 30px; padding: 20px; background: #f0f0f0; border-radius: 8px; word-wrap: break-word; }
  </style>
</head>
<body>

<h1>ProitBridge — WhatsApp Setup</h1>
<button onclick="launchWhatsAppSignup()">Continue with Facebook</button>
<div id="result"></div>

<script>
  window.fbAsyncInit = function() {
    FB.init({
      appId: 'YOUR_APP_ID_HERE',
      cookie: true,
      xfbml: true,
      version: 'v21.0'
    });
  };

  (function(d, s, id) {
    var js, fjs = d.getElementsByTagName(s)[0];
    if (d.getElementById(id)) return;
    js = d.createElement(s); js.id = id;
    js.src = "https://connect.facebook.net/en_US/sdk.js";
    fjs.parentNode.insertBefore(js, fjs);
  }(document, 'script', 'facebook-jssdk'));

  const sessionInfoListener = (event) => {
    if (event.origin !== "https://www.facebook.com" && event.origin !== "https://web.facebook.com") return;
    try {
      const data = JSON.parse(event.data);
      if (data.type === 'WA_EMBEDDED_SIGNUP') {
        document.getElementById('result').innerHTML = '<b>Session Info:</b><br>' + JSON.stringify(data, null, 2);
        console.log('Session Info:', data);
      }
    } catch {}
  };
  window.addEventListener('message', sessionInfoListener);

  const fbLoginCallback = (response) => {
    if (response.authResponse) {
      const code = response.authResponse.code;
      document.getElementById('result').innerHTML += '<br><br><b>Auth Code:</b><br>' + code;
      console.log('Code:', code);
    } else {
      document.getElementById('result').innerHTML = '<b>Login cancelled or failed.</b>';
    }
  };

  const launchWhatsAppSignup = () => {
    FB.login(fbLoginCallback, {
      config_id: '1014153814517492',
      response_type: 'code',
      override_default_response_type: true,
      extras: {
        setup: {},
        featureType: '',
        sessionInfoVersion: '3'
      }
    });
  };
</script>

</body>
</html>
